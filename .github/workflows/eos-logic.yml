name: Eos-Thermodynamic-Validation
on: [push]

jobs:
  validate_thermal_logic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Execute Eos Core Simulation
        run: |
          cargo run --verbose
        # This allows me to "see" the output in your GitHub Actions tab.
